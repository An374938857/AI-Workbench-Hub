name: ai-skill-sharing-platform-release

services:
  backend:
    environment:
      - APP_ENV=development
    volumes:
      - ../backend:/app
      - backend_uploads:/app/uploads
    command: sh -c "uvicorn app.main:app --reload --host 0.0.0.0 --port 8080"

  frontend:
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
