name: quality-gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ai_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/ai_platform?charset=utf8mb4
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff
        run: |
          ruff check \
            app/routers/conversations.py \
            app/routers/conversations_shared.py \
            app/routers/conversation_skills.py \
            app/routers/conversation_sandbox.py \
            app/routers/conversation_prompt_templates.py
      - name: Pytest
        run: PYTHONPATH=. pytest -q
      - name: Alembic migration gate
        run: |
          alembic upgrade head
          alembic current

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: ESLint
        run: npm run lint
      - name: Any budget check
        run: npm run check:any-budget
      - name: Build
        run: npm run build
